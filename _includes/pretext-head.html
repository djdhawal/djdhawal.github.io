<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    min-height: 100vh;
    font-family: 'JetBrains Mono', monospace;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  canvas { display: block; cursor: default; }

  .pretext-body {
    width: 100%;
    max-width: 820px;
    padding: 0 48px;
    color: #888;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 400;
    line-height: 1.85;
  }

  .pretext-body p {
    margin-bottom: 1.4em;
  }

  .pretext-body a {
    color: #999;
    text-decoration: none;
    border-bottom: 1px solid #333;
    transition: color 0.2s, border-color 0.2s;
  }

  .pretext-body a:hover {
    color: #e0e0e0;
    border-color: #666;
  }

  .pretext-body em, .pretext-body i {
    color: #aaa;
    font-style: italic;
  }

  .pretext-body strong, .pretext-body b {
    color: #bbb;
    font-weight: 500;
  }

  .pretext-body ol, .pretext-body ul {
    margin-bottom: 1.4em;
    padding-left: 1.5em;
  }

  .pretext-body li {
    margin-bottom: 0.6em;
  }

  .pretext-body h1, .pretext-body h2, .pretext-body h3 {
    color: #ccc;
    font-weight: 500;
    margin: 2em 0 0.8em;
  }

  .pretext-body h1 { font-size: 1.3em; }
  .pretext-body h2 { font-size: 1.1em; }
  .pretext-body h3 { font-size: 1em; color: #aaa; }

  .pretext-body code {
    background: #151515;
    color: #aaa;
    padding: 0.15em 0.4em;
    font-size: 0.92em;
    border-radius: 3px;
  }

  .pretext-body pre {
    background: #111;
    padding: 1.2em;
    margin-bottom: 1.4em;
    overflow-x: auto;
    border-left: 2px solid #222;
  }

  .pretext-body pre code {
    background: none;
    padding: 0;
  }

  .pretext-body blockquote {
    border-left: 2px solid #333;
    padding-left: 1em;
    color: #666;
    margin-bottom: 1.4em;
  }

  .pretext-body sub {
    font-size: 0.75em;
    color: #777;
  }

  .pretext-body img {
    max-width: 100%;
    border-radius: 4px;
    margin: 1em 0;
  }

  .pretext-body hr {
    border: none;
    border-top: 1px solid #222;
    margin: 2em 0;
  }
</style>
